
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Marky Boy – Coming Soon</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ccff;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    #logo-container {
      animation: spin 2s linear, settle 1.5s ease-in-out 2s forwards;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes settle {
      to {
        transform: translateY(-40px) scale(0.6);
      }
    }

    #logo {
      width: 200px;
    }

    #text-content {
      opacity: 0;
      animation: fadeIn 1s ease-in-out 2.5s forwards;
      margin-top: 20px;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    h1 {
      font-size: 3rem;
      margin: 10px 0;
    }

    p {
      font-size: 1.2rem;
      color: #66e0ff;
    }
  </style>
</head>
<body>
  <div id="logo-container">
    <img src="DJ_Marky_Boy_Logo_Final.png" alt="DJ Marky Boy Logo" id="logo" />
  </div>

  <div id="text-content">
    <h1>DJ Marky Boy</h1>
    <p>Hardstyle energy is on the way...<br />Website coming soon.</p>
  </div>
</body>
</html>
